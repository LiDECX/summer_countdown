<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Summer Countdown — LiDECX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #e8e8e8;
      --muted: #555;
      --text: #999;
      --bright: #fff;
      --green: #4ade80;
      --sun: #FFD166;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e5e5e5;
      --accent: #1a1a1a;
      --muted: #888;
      --text: #444;
      --bright: #000;
      --green: #16a34a;
      --sun: #f59e0b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
    }

    header {
      padding: 24px 0;
      display: flex;
      justify-content: flex-end;
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--bright);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      transition: all 0.15s;
    }

    .theme-toggle:hover {
      background: var(--surface);
      border-color: var(--muted);
    }

    #hero { padding: 40px 0 60px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
      margin-bottom: 32px;
    }

    .hero-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2rem, 6vw, 2.5rem);
      font-weight: 600;
      color: var(--bright);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .hero-sub {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 40px;
    }

    .progress-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 12px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .pct-value { color: var(--sun); font-weight: 600; }

    .track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: var(--sun);
      width: 0%;
      transition: width 0.3s ease;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .unit-val {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      color: var(--bright);
      font-weight: 600;
    }

    .unit-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .season-box {
      border-top: 1px solid var(--border);
      margin-top: 40px;
      padding-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .season-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .season-item.active { color: var(--green); }
    .season-item.active .season-name { color: var(--green); font-weight: 500; }
    .season-item.done .season-status { color: var(--muted); }

    .season-name { color: var(--accent); font-family: 'JetBrains Mono', monospace; }
    .season-status { font-size: 0.75rem; }

    footer {
      margin-top: 60px;
      padding: 32px 0;
      border-top: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
    }

    @media (min-width: 480px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body data-theme="dark">

  <div class="container">
    <header>
      <button class="theme-toggle" id="themeToggle">LIGHT</button>
    </header>
  </div>

  <section id="hero">
    <div class="container">
      <div class="badge">✦ AUTOMATIC SYSTEM</div>
      <h1 class="hero-name">Summer Countdown</h1>
      <p class="hero-sub">Автоматический трекер времен года</p>

      <div class="progress-container">
        <div class="label-row">
          <span>Прогресс до лета</span>
          <span class="pct-value" id="pct">0.00%</span>
        </div>
        <div class="track">
          <div class="fill" id="mainFill"></div>
        </div>
      </div>

      <div class="grid">
        <div class="card"><span class="unit-val" id="cDays">—</span><span class="unit-label">дней</span></div>
        <div class="card"><span class="unit-val" id="cHours">—</span><span class="unit-label">часов</span></div>
        <div class="card"><span class="unit-val" id="cMin">—</span><span class="unit-label">минут</span></div>
        <div class="card"><span class="unit-val" id="cSec">—</span><span class="unit-label">секунд</span></div>
      </div>

      <div class="season-box">
        <div class="season-item" id="s-autumn">
          <span class="season-name">Осень</span>
          <span class="season-status" id="st-autumn">ожидание</span>
        </div>
        <div class="season-item" id="s-winter">
          <span class="season-name">Зима</span>
          <span class="season-status" id="st-winter">ожидание</span>
        </div>
        <div class="season-item" id="s-spring">
          <span class="season-name">Весна</span>
          <span class="season-status" id="st-spring">ожидание</span>
        </div>
        <div class="season-item" id="s-summer">
          <span class="season-name">Лето</span>
          <span class="season-status" id="st-summer">скоро</span>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">© <span id="year"></span> LiDECX </div>
  </footer>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;

    const savedTheme = localStorage.getItem('theme') || 'dark';
    body.setAttribute('data-theme', savedTheme);
    themeToggle.textContent = savedTheme === 'dark' ? 'LIGHT' : 'DARK';

    themeToggle.addEventListener('click', () => {
      const isDark = body.getAttribute('data-theme') === 'dark';
      const newTheme = isDark ? 'light' : 'dark';
      body.setAttribute('data-theme', newTheme);
      themeToggle.textContent = isDark ? 'DARK' : 'LIGHT';
      localStorage.setItem('theme', newTheme);
    });

    const dates = {
      autumn: new Date("September 1, 2025 00:00:00").getTime(),
      winter: new Date("December 1, 2025 00:00:00").getTime(),
      spring: new Date("March 1, 2026 00:00:00").getTime(),
      summer: new Date("June 1, 2026 00:00:00").getTime()
    };

    function update() {
      const now = Date.now();
      document.getElementById('year').textContent = new Date().getFullYear();

      const diff = Math.max(0, dates.summer - now);
      document.getElementById('cDays').textContent = Math.floor(diff / (1000 * 60 * 60 * 24));
      document.getElementById('cHours').textContent = Math.floor(diff / (1000 * 60 * 60)) % 24;
      document.getElementById('cMin').textContent = Math.floor(diff / (1000 * 60)) % 60;
      document.getElementById('cSec').textContent = Math.floor(diff / 1000) % 60;

      const totalPeriod = dates.summer - dates.autumn;
      const currentPassed = now - dates.autumn;
      const progress = Math.min(100, Math.max(0, (currentPassed / totalPeriod) * 100));
      document.getElementById('mainFill').style.width = progress + '%';
      document.getElementById('pct').textContent = progress.toFixed(2) + '%';

      updateSeasonStatus('autumn', dates.autumn, dates.winter);
      updateSeasonStatus('winter', dates.winter, dates.spring);
      updateSeasonStatus('spring', dates.spring, dates.summer);

      const sSummer = document.getElementById('s-summer');
      if (now >= dates.summer) {
        sSummer.className = 'season-item active';
        document.getElementById('st-summer').textContent = 'НАСТУПИЛО ☀️';
      }
    }

    function updateSeasonStatus(id, start, end) {
      const now = Date.now();
      const row = document.getElementById('s-' + id);
      const status = document.getElementById('st-' + id);

      if (now < start) {
        row.className = 'season-item';
        status.textContent = 'ожидание';
      } else if (now >= start && now < end) {
        row.className = 'season-item active';
        const prog = ((now - start) / (end - start) * 100).toFixed(0);
        status.textContent = 'идет (' + prog + '%)';
      } else {
        row.className = 'season-item done';
        status.textContent = 'завершено ✓';
      }
    }

    setInterval(update, 1000);
    update();
  </script>
</body>
</html>
