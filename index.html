<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ждём лето</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#ececec;
margin:0;
color:#222;
}

.header{
text-align:center;
padding:12px;
background:#2b2b2b;
color:white;
font-size:14px;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

h1{
text-align:center;
color:red;
margin:10px 0;
}

.subtitle{
text-align:center;
margin-bottom:20px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:8px 0;
}

.label{
width:80px;
}

.value{
width:120px;
font-size:14px;
}

.bar{
flex:1;
height:16px;
background:#dcdcdc;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#6e6e6e;
width:0%;
transition:width .2s linear;
}

.dateRow{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:13px;
flex-wrap:wrap;
gap:5px;
}

.bigbar{
height:18px;
background:#dcdcdc;
border-radius:10px;
overflow:hidden;
margin-top:6px;
}

.bigfill{
height:100%;
background:linear-gradient(90deg,#4cff7a,#6b6bff);
width:0%;
transition:width .2s linear;
}

.percent{
text-align:center;
margin-top:10px;
font-size:14px;
}

.seasons{
display:flex;
gap:10px;
margin-top:25px;
flex-wrap:wrap;
}

.season{
flex:1;
min-width:150px;
background:#dcdcdc;
padding:8px;
text-align:center;
border-radius:6px;
font-size:14px;
}

.footer{
text-align:center;
margin-top:30px;
font-size:12px;
color:#555;
}

@media(max-width:600px){

.label{
width:60px;
font-size:13px;
}

.value{
width:90px;
font-size:13px;
}

}

</style>
</head>

<body>

<div class="header">
Это мой первый сайт-проект
</div>

<div class="container">

<h1>Ждём лето!</h1>
<div class="subtitle">До лета осталось...</div>

<div class="row">
<div class="label">недель:</div>
<div class="value" id="weeks"></div>
<div class="bar"><div id="weeksBar" class="fill"></div></div>
</div>

<div class="row">
<div class="label">дней:</div>
<div class="value" id="days"></div>
<div class="bar"><div id="daysBar" class="fill"></div></div>
</div>

<div class="row">
<div class="label">часов:</div>
<div class="value" id="hours"></div>
<div class="bar"><div id="hoursBar" class="fill"></div></div>
</div>

<div class="row">
<div class="label">минут:</div>
<div class="value" id="minutes"></div>
<div class="bar"><div id="minutesBar" class="fill"></div></div>
</div>

<div class="row">
<div class="label">секунд:</div>
<div class="value" id="seconds"></div>
<div class="bar"><div id="secondsBar" class="fill"></div></div>
</div>

<div class="dateRow">
<div>01/09/2025 00:00:00</div>
<div id="now"></div>
<div>01/06/2026 00:00:00</div>
</div>

<div class="bigbar">
<div id="yearBar" class="bigfill"></div>
</div>

<div class="percent" id="percent"></div>

<div class="seasons">
<div class="season">осень уже позади</div>
<div class="season">зима уже позади</div>
<div class="season" id="spring"></div>
</div>

<div class="footer">
summer countdown
</div>

</div>

<script>

const startDate=new Date("September 1, 2025 00:00:00").getTime()
const endDate=new Date("June 1, 2026 00:00:00").getTime()

function update(){

const nowDate=new Date()
const now=nowDate.getTime()

const diff=endDate-now

const weeks=diff/(1000*60*60*24*7)
const days=diff/(1000*60*60*24)
const hours=diff/(1000*60*60)

document.getElementById("weeks").textContent=weeks.toFixed(7)
document.getElementById("days").textContent=days.toFixed(7)
document.getElementById("hours").textContent=hours.toFixed(6)

const sec=nowDate.getSeconds()
const min=nowDate.getMinutes()
const hour=nowDate.getHours()

document.getElementById("seconds").textContent=sec
document.getElementById("minutes").textContent=min
document.getElementById("hours").textContent=hour

document.getElementById("secondsBar").style.width=(sec/60*100)+"%"
document.getElementById("minutesBar").style.width=(min/60*100)+"%"
document.getElementById("hoursBar").style.width=(hour/24*100)+"%"

const day=nowDate.getDate()
document.getElementById("daysBar").style.width=(day/31*100)+"%"

const weekDay=nowDate.getDay()
document.getElementById("weeksBar").style.width=(weekDay/7*100)+"%"

const progress=((now-startDate)/(endDate-startDate))*100

document.getElementById("yearBar").style.width=progress+"%"

document.getElementById("percent").textContent=
progress.toFixed(12)+"% нелетнего периода завершено"

document.getElementById("spring").textContent=
(progress/4).toFixed(12)+"% весны завершено"

document.getElementById("now").textContent=
"сейчас: "+nowDate.toLocaleString()

}

setInterval(update,100)

</script>

</body>
</html>
