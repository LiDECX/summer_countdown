<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ждём лето</title>

<style>

body{
font-family:Arial;
background:#efefef;
text-align:center;
margin:0;
}

.top{
background:#1e33ff;
color:white;
padding:12px;
font-size:14px;
}

.container{
width:90%;
max-width:900px;
margin:auto;
}

h1{
color:red;
margin-top:20px;
}

.row{
display:flex;
align-items:center;
margin:8px 0;
}

.label{
width:90px;
text-align:left;
}

.bar{
flex:1;
height:16px;
background:#ddd;
margin-left:10px;
}

.progress{
height:16px;
background:#777;
width:0%;
}

.bigbar{
height:18px;
background:#ddd;
margin-top:15px;
}

.bigprogress{
height:18px;
background:linear-gradient(90deg,#4cff7c,#6b6bff);
width:0%;
}

.seasons{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.season{
flex:1;
margin:5px;
padding:8px;
background:#ddd;
}

</style>
</head>

<body>

<div class="top">
Отключите блокировщик рекламы. Это учебный сайт.
</div>

<div class="container">

<h1>Ждём лето!</h1>

<p>До лета осталось...</p>

<div class="row">
<div class="label">недель:</div>
<div class="bar"><div id="weeksBar" class="progress"></div></div>
</div>

<div class="row">
<div class="label">дней:</div>
<div class="bar"><div id="daysBar" class="progress"></div></div>
</div>

<div class="row">
<div class="label">часов:</div>
<div class="bar"><div id="hoursBar" class="progress"></div></div>
</div>

<div class="row">
<div class="label">минут:</div>
<div class="bar"><div id="minutesBar" class="progress"></div></div>
</div>

<div class="row">
<div class="label">секунд:</div>
<div class="bar"><div id="secondsBar" class="progress"></div></div>
</div>

<p id="now"></p>

<div class="bigbar">
<div id="yearBar" class="bigprogress"></div>
</div>

<p id="percent"></p>

<div class="seasons">
<div class="season">Осень позади</div>
<div class="season">Зима позади</div>
<div class="season" id="spring"></div>
</div>

</div>

<script>

const start = new Date("September 1, 2025 00:00:00").getTime();
const summer = new Date("June 1, 2026 00:00:00").getTime();

function update(){

const now = new Date().getTime();

const diff = summer - now;

const weeks = diff / (1000*60*60*24*7);
const days = diff / (1000*60*60*24);
const hours = diff / (1000*60*60);
const minutes = diff / (1000*60);
const seconds = diff / 1000;

document.getElementById("weeksBar").style.width = (weeks/12*100)+"%";
document.getElementById("daysBar").style.width = (days/90*100)+"%";
document.getElementById("hoursBar").style.width = (hours/2000*100)+"%";
document.getElementById("minutesBar").style.width = (minutes/120000*100)+"%";
document.getElementById("secondsBar").style.width = (seconds/7000000*100)+"%";

const progress = ((now-start)/(summer-start))*100;

document.getElementById("yearBar").style.width = progress+"%";

document.getElementById("percent").innerText =
progress.toFixed(2)+"% нелетнего периода завершено";

document.getElementById("now").innerText =
"сейчас: "+ new Date().toLocaleString();

document.getElementById("spring").innerText =
(progress/4).toFixed(2)+"% весны завершено";

}

setInterval(update,1000);

</script>

</body>
</html>
